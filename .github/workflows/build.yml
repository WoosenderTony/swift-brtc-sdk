name: Build Library

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: build
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write

jobs:
  build-xcframework:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read VERSION
        run: echo "VERSION=$(cat VERSION)" >> "$GITHUB_ENV"

      - name: Check VERSION against existing tags
        if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master'
        run: |
          git fetch --tags
          if git tag -l "v${{ env.VERSION }}" | grep -q .; then
            echo "::error::VERSION ${{ env.VERSION }} already has a published tag (v${{ env.VERSION }}). Bump the VERSION file."
            exit 1
          fi
          LATEST_TAG=$(git tag -l 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 | sed 's/^v//')
          echo "::notice::Latest existing tag is v$LATEST_TAG"
          if [ -n "$LATEST_TAG" ]; then
            HIGHER=$(printf '%s\n' "$LATEST_TAG" "${{ env.VERSION }}" | sort -V | tail -n1)
            if [ "$HIGHER" != "${{ env.VERSION }}" ]; then
              echo "::error::VERSION ${{ env.VERSION }} is lower than existing tag v$LATEST_TAG. Bump the VERSION file."
              exit 1
            fi
          fi

      - name: Build XCFramework
        id: build
        uses: ./.github/actions/build-xcframework
        with:
          marketing_version: ${{ env.VERSION }}
          run_tests: "true"

      - name: Upload XCFramework artifact
        uses: actions/upload-artifact@v4
        with:
          name: BandwidthRTC-${{ env.VERSION }}
          path: ${{ steps.build.outputs.zip_path }}
          retention-days: 3
