name: Publish Release

on:
  release:
    types:
      - published

concurrency:
  group: publish-release
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write

jobs:
  build-xcframework:
    # Only run for production (non-pre-release) releases
    if: ${{ !github.event.release.prerelease }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Build XCFramework
        id: build
        uses: ./.github/actions/build-xcframework
        with:
          marketing_version: ${{ steps.version.outputs.VERSION }}

      - name: Upload XCFramework to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${GITHUB_REF_NAME}" "${{ steps.build.outputs.zip_path }}" \
            --clobber \
            --repo "${{ github.repository }}"

      - name: Create major/minor version tags
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f1-2)

          # Create annotated tag for major version if it doesn't exist
          if ! git rev-parse "v$MAJOR" >/dev/null 2>&1; then
            git tag -a "v$MAJOR" -m "Release v$MAJOR series" "v$VERSION"
            git push origin "v$MAJOR"
          fi

          # Create annotated tag for major.minor version if it doesn't exist
          if ! git rev-parse "v$MINOR" >/dev/null 2>&1; then
            git tag -a "v$MINOR" -m "Release v$MINOR series" "v$VERSION"
            git push origin "v$MINOR"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
